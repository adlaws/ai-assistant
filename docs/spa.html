<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Document Indexer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #eee;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2em;
            color: #00d4ff;
        }
        
        .search-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .search-box input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-family: inherit;
        }
        
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0, 0, 0, 0.5);
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #00d4ff;
            display: none;
        }
        
        .results {
            display: none;
        }
        
        .result-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        .result-snippet {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 8px;
            color: #ccc;
        }
        
        .result-file {
            font-size: 12px;
            color: #00d4ff;
            font-family: monospace;
        }
        
        .error {
            background: rgba(255, 50, 50, 0.2);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 50, 50, 0.3);
        }
        
        .index-box {
            background: rgba(255, 100, 100, 0.1);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 100, 100, 0.3);
        }
        
        .index-box button {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border: 2px solid rgba(255, 100, 100, 0.5);
            border-radius: 8px;
            background: rgba(255, 100, 100, 0.2);
            color: #ff6b6b;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        .index-box button:hover {
            background: rgba(255, 100, 100, 0.4);
            border-color: #ff6b6b;
            color: #ff5252;
        }
        
        .index-box button:active {
            background: rgba(255, 100, 100, 0.6);
            transform: scale(0.98);
        }
        
        .index-box button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Semantic Document Indexer</h1>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Enter your question (e.g., 'What is AI?')..." autofocus>
        </div>
        
        <div class="loading" id="loading">
            Searching documents...
        </div>
        
        <div class="error" id="error" style="display: none;"></div>
        
        <div class="results" id="results"></div>
        
        <div class="index-box" id="indexBox" style="display: none;">
            <button id="indexBtn">📚 Index Documents</button>
            <div id="indexStatus"></div>
        </div>
        
        <footer>
            Built with Ollama and ChromaDB
        </footer>
    </div>
    
    <script>
        async function search(query) {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('error').style.display = 'none';
                document.getElementById('results').style.display = 'none';
                document.getElementById('results').innerHTML = '';
                
                const response = await fetch(`/search?query=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                
                if (data.results && data.results.length > 0) {
                    document.getElementById('error').style.display = 'none';
                    document.getElementById('results').style.display = 'block';
                    
                    data.results.forEach((result, index) => {
                        const card = document.createElement('div');
                        card.className = 'result-card';
                        
                         let fileInfo = '';
                         if (result.metadata) {
                             // Display all available metadata
                             if (result.metadata.type) {
                                 fileInfo += `<div class="result-file">Type: ${result.metadata.type}</div>`;
                             }
                             if (result.metadata.filepath) {
                                 fileInfo += `<div class="result-file">Path: ${result.metadata.filepath}</div>`;
                             }
                             if (result.metadata.source) {
                                 fileInfo += `<div class="result-file">Source: ${result.metadata.source}</div>`;
                             }
                             if (result.metadata.page) {
                                 fileInfo += `<div class="result-file">Page: ${result.metadata.page}</div>`;
                             }
                             if (result.metadata.chunk) {
                                 fileInfo += `<div class="result-file">Chunk: ${result.metadata.chunk}</div>`;
                             }
                             // Add any other metadata fields
                             Object.keys(result.metadata).forEach(key => {
                                 if (key !== 'type' && key !== 'filepath' && key !== 'source' && key !== 'page' && key !== 'chunk') {
                                     fileInfo += `<div class="result-file">${key}: ${result.metadata[key]}</div>`;
                                 }
                             });
                         }
                         
                         card.innerHTML = `
                             <div class="result-snippet">${result.content}</div>
                             ${fileInfo}
                         `;
                         
                         document.getElementById('results').appendChild(card);
                     });
                } else {
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error').textContent = 'No results found. Try a different query.';
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Error: ${error.message}`;
            }
        }
    
        document.getElementById('searchInput').addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value.trim();
                if (query) {
                    await search(query);
                    e.target.value = '';
                }
            }
        });
    
        // Enable Ctrl+K quick search
        document.addEventListener('keydown', async (e) => {
            if (e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });
    
        document.addEventListener('click', (e) => {
            if (e.target.id === 'searchInput') return;
            document.getElementById('searchInput').blur();
        });
    
        // Index button handler
        document.getElementById('indexBtn').addEventListener('click', async () => {
            const indexBox = document.getElementById('indexBox');
            const indexBtn = document.getElementById('indexBtn');
            const indexStatus = document.getElementById('indexStatus');
            
            indexBtn.disabled = true;
            indexStatus.textContent = 'Starting indexing...';
            indexBox.style.display = 'block';
            
            try {
                const response = await fetch('/index', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    indexStatus.style.color = '#4ade80';
                    indexStatus.textContent = `✅ ${data.message}`;
                    setTimeout(() => {
                        indexBtn.disabled = false;
                        indexStatus.textContent = 'Click to index documents';
                    }, 3000);
                } else {
                    indexStatus.style.color = '#f87171';
                    indexStatus.textContent = `❌ Error: ${data.error}`;
                    indexBtn.disabled = false;
                }
            } catch (error) {
                indexStatus.style.color = '#f87171';
                indexStatus.textContent = `❌ Error: ${error.message}`;
                indexBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
